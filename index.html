<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>PC Puzzle Workshop</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>PC Puzzle Workshop</h1>
    <div class="hud">
      <span id="progress">0 / 12 piezas instaladas</span>
      <button id="resetBtn">Reiniciar</button>
    </div>
  </header>

  <main class="workshop">
    <section class="board" aria-label="Mesa de trabajo">
      <div class="wood-texture"></div>

      <div id="caseArea" class="case" aria-label="Case de PC">
        <div class="case-inner">
          <div id="motherboard" class="motherboard"></div>
          <div id="psuSlot" class="slot psu-slot" data-accept="psu">PSU</div>
          <div id="hddSlot" class="slot hdd-slot" data-accept="hdd">HDD</div>
          <div id="fanSlot" class="slot fan-slot" data-accept="fan">FAN</div>
        </div>
      </div>

      <svg id="cables" class="cables" viewBox="0 0 1400 760" preserveAspectRatio="none"></svg>

      <aside id="partsBin" class="parts-bin" aria-label="Piezas sueltas"></aside>
    </section>
  </main>

  <template id="partTemplate">
    <div class="part" draggable="true">
      <div class="label"></div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
